<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISM Tools</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
<div class="dashboard">

    <div class="left-half">
        <div class="panel panel-flex">
            <div class="panel-header">Editable Player Stats</div>
            <div id="stats-container" class="scrollable-area"></div> 
        </div>
    </div>

    <div class="right-half">
        <div class="panel panel-full">
            <div class="panel-header">Calculator</div>
            <div class="panel-header tool-nav">
                <button class="btn-grey" onclick="loadTool('goldCalc')">Gold Calc</button>
                <button class="btn-grey" onclick="loadTool('comingSoon')">Next Tool...</button>
            </div>
            
            <div id="tool-container" class="scrollable-area p-md">            
                </div>
        </div>
    </div>

</div>

<script src="utility.js"></script> 
<script src="stats.js"></script>
<script src="tools/goldForSSL.js"></script>
</body>
</html>
