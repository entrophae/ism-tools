<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISM Tools</title>
    <link rel="stylesheet" href="styles.css" type="text/css">

    <script src="registry.js" defer></script> 
    <script src="utility.js" defer></script> 
    <script src="stats.js" defer></script>
</head>
<body>
<div class="dashboard">

    <div class="left-half">
        <div class="panel panel-flex">
            <div class="panel-header">Editable Player Stats</div>
            <div id="stats-container" class="scrollable-area"></div> 
        </div>
    </div>

    <div class="right-half">
        <div class="panel panel-full">
            <div class="panel-header">Calculator</div>
            <div class="panel-header tool-nav" id="dynamic-tool-nav">
            </div>
            
            <div id="tool-container" class="scrollable-area p-md">            
                </div>
        </div>
    </div>

</div>
</body>
<footer>
<div style="position: absolute; bottom: 0; left: 0;">
    <a href="https://github.com/entrophae/ISM-Tools" alt="Github">
        <img src="https://github.com/fluidicon.png" width="32rem">
        </img>
    </a>
</div>
</footer>
</html>
